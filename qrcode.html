<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — Mariage David &amp; Basma</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FDFAF6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
    }
    .card {
      background: #FFFFFE;
      border: 2px solid #E8D09A;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(61,43,31,.12);
    }
    .orn { color: #C9A96E; font-size: 1.4rem; margin-bottom: .5rem; display: block; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700;
      color: #3D2B1F; margin-bottom: .2rem;
    }
    h1 em { font-style: italic; color: #9A7340; }
    .date { font-size: .78rem; letter-spacing: .14em; text-transform: uppercase; color: #7A6353; margin-bottom: 1.5rem; }
    .qr-wrap {
      background: #FDFAF6;
      border-radius: 16px; padding: 1rem;
      display: inline-block; margin-bottom: 1.5rem;
      border: 1px solid #F0E6D8;
    }
    .qr-wrap img { display: block; width: 220px; height: 220px; }
    .instruction { font-size: .82rem; color: #7A6353; line-height: 1.6; margin-bottom: 1rem; }
    .url { font-size: .7rem; color: #B8777C; word-break: break-all; }
    .divider {
      display: flex; align-items: center; gap: .5rem;
      color: #C9A96E; font-size: .9rem; margin: 1rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, #C9A96E);
    }
    .divider::after { background: linear-gradient(270deg, transparent, #C9A96E); }

    @media print {
      body { background: white; }
      .card { box-shadow: none; border-color: #C9A96E; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="orn">❧</span>
    <h1>Mariage de<br><em>David &amp; Basma</em></h1>
    <p class="date">Samedi 23 mai 2026</p>
    <div class="divider">💍</div>
    <div class="qr-wrap">
      <img src="qrcode-mariage.png" alt="QR Code plan de table">
    </div>
    <p class="instruction">Scannez ce QR code pour<br>retrouver votre table 💕</p>
    <p class="url">plan-de-table-mariage-production.up.railway.app</p>
  </div>
</body>
</html>
